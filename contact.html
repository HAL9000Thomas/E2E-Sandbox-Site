<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EggShop – Contact Us</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #fdf6ec; min-height: 100vh; }
    header { background: #fff; border-bottom: 1px solid #e5d9c8; padding: 1rem 2rem; }
    header h1 { font-size: 1.4rem; color: #b45309; }
    main { max-width: 600px; margin: 2rem auto; padding: 0 1.5rem; }
    .card { background: #fff; border: 1px solid #e5d9c8; border-radius: 12px; padding: 2rem; }
    .card h2 { font-size: 1.2rem; color: #444; margin-bottom: 0.25rem; }
    .card p.sub { font-size: 0.85rem; color: #888; margin-bottom: 1.5rem; }
    .field { margin-bottom: 1.1rem; }
    label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 4px; }
    input[type="text"], input[type="email"], input[type="tel"], select, textarea {
      width: 100%; padding: 0.6rem 0.75rem; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95rem; background: #fff; color: #333;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #b45309; }
    textarea { resize: vertical; min-height: 100px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .radio-group, .checkbox-group { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
    .radio-group label, .checkbox-group label { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; color: #444; cursor: pointer; }
    input[type="radio"], input[type="checkbox"] { width: 16px; height: 16px; accent-color: #b45309; cursor: pointer; }
    .range-row { display: flex; align-items: center; gap: 12px; }
    input[type="range"] { flex: 1; accent-color: #b45309; }
    .range-val { font-size: 0.9rem; font-weight: 500; color: #b45309; min-width: 32px; }
    .btn { margin-top: 1.5rem; width: 100%; padding: 0.7rem; background: #b45309; color: #fff; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
    .btn:hover { background: #92400e; }
    .success { display: none; margin-top: 1rem; background: #d1fae5; border: 1px solid #6ee7b7; border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.9rem; color: #065f46; }
    .back { display: inline-block; margin-top: 1.25rem; font-size: 0.85rem; color: #b45309; text-decoration: none; }
    .back:hover { text-decoration: underline; }
    .divider { border: none; border-top: 1px solid #f0e8d8; margin: 1.25rem 0; }
  </style>
</head>
<body>
  <header>
    <h1>🥚 EggShop</h1>
  </header>

  <main>
    <div class="card">
      <h2>Contact us</h2>
      <p class="sub">Have a question about your order? We'd love to hear from you.</p>

      <div class="row">
        <div class="field">
          <label for="first-name">First name</label>
          <input type="text" id="first-name" placeholder="Mary" />
        </div>
        <div class="field">
          <label for="last-name">Last name</label>
          <input type="text" id="last-name" placeholder="O'Brien" />
        </div>
      </div>

      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="mary@example.com" />
      </div>

      <div class="field">
        <label for="phone">Phone number (optional)</label>
        <input type="tel" id="phone" placeholder="+353 1 234 5678" />
      </div>

      <hr class="divider" />

      <div class="field">
        <label for="topic">What is your enquiry about?</label>
        <select id="topic">
          <option value="">– Select a topic –</option>
          <option value="order">My order</option>
          <option value="delivery">Delivery issue</option>
          <option value="product">Product question</option>
          <option value="billing">Billing</option>
          <option value="wholesale">Wholesale / bulk orders</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="field">
        <label>Preferred egg type</label>
        <div class="radio-group">
          <label><input type="radio" name="egg-type" value="free-range" /> Free range</label>
          <label><input type="radio" name="egg-type" value="organic" /> Organic</label>
          <label><input type="radio" name="egg-type" value="duck" /> Duck eggs</label>
          <label><input type="radio" name="egg-type" value="not-sure" checked /> Not sure yet</label>
        </div>
      </div>

      <div class="field">
        <label>How did you hear about us?</label>
        <div class="checkbox-group">
          <label><input type="checkbox" id="src-social" /> Social media</label>
          <label><input type="checkbox" id="src-friend" /> Friend or family</label>
          <label><input type="checkbox" id="src-search" /> Search engine</label>
          <label><input type="checkbox" id="src-market" /> Farmers market</label>
          <label><input type="checkbox" id="src-other" /> Other</label>
        </div>
      </div>

      <div class="field">
        <label>Weekly egg quantity (approx.)</label>
        <div class="range-row">
          <input type="range" id="qty" min="6" max="60" step="6" value="12" />
          <span class="range-val" id="qty-val">12</span>
          <span style="font-size:0.85rem; color:#888;">eggs / week</span>
        </div>
      </div>

      <div class="field">
        <label for="message">Message</label>
        <textarea id="message" placeholder="Tell us more about your enquiry..."></textarea>
      </div>

      <button class="btn" id="submit-btn">Send message</button>

      <div class="success" id="success-msg">
        ✓ Thanks for reaching out! We'll get back to you within 1 business day.
      </div>
    </div>

    <a href="index.html" class="back">← Back to login</a>
  </main>

  <script>
    const qtyInput = document.getElementById('qty');
    const qtyVal = document.getElementById('qty-val');
    qtyInput.addEventListener('input', () => { qtyVal.textContent = qtyInput.value; });

    document.getElementById('submit-btn').onclick = () => {
      const email = document.getElementById('email').value.trim();
      const first = document.getElementById('first-name').value.trim();
      if (!first || !email) {
        alert('Please fill in at least your first name and email.');
        return;
      }
      document.getElementById('success-msg').style.display = 'block';
      document.getElementById('submit-btn').disabled = true;
      document.getElementById('submit-btn').textContent = 'Sent!';
    };
  </script>
</body>
</html>
